name: Provision and Deploy Study Assistant

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'terraform/**'
      - 'app.py'
      - 'requirements.txt'

jobs:

  # ── Job 1: Provision Azure Infrastructure ──────────────────────────────────
  provision:
    name: Provision Infrastructure
    runs-on: ubuntu-latest

    env:
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    outputs:
      openai_endpoint: ${{ steps.tf_outputs.outputs.openai_endpoint }}
      search_endpoint: ${{ steps.tf_outputs.outputs.search_endpoint }}
      app_name: ${{ steps.tf_outputs.outputs.app_name }}
      app_url: ${{ steps.tf_outputs.outputs.app_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Terraform Validate
        working-directory: terraform
        run: terraform validate

      - name: Terraform Plan
        working-directory: terraform
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        working-directory: terraform
        run: terraform apply -auto-approve tfplan

      - name: Capture Outputs
        id: tf_outputs
        working-directory: terraform
        run: |
          OPENAI_ENDPOINT=$(terraform output -raw openai_endpoint)
          OPENAI_KEY=$(terraform output -raw openai_api_key)
          SEARCH_ENDPOINT=$(terraform output -raw search_endpoint)
          SEARCH_KEY=$(terraform output -raw search_api_key)
          APP_NAME=$(terraform output -raw app_name)
          APP_URL=$(terraform output -raw app_url)

          echo "::add-mask::$OPENAI_KEY"
          echo "::add-mask::$SEARCH_KEY"

          echo "openai_endpoint=$OPENAI_ENDPOINT" >> $GITHUB_OUTPUT
          echo "openai_key=$OPENAI_KEY" >> $GITHUB_OUTPUT
          echo "search_endpoint=$SEARCH_ENDPOINT" >> $GITHUB_OUTPUT
          echo "search_key=$SEARCH_KEY" >> $GITHUB_OUTPUT
          echo "app_name=$APP_NAME" >> $GITHUB_OUTPUT
          echo "app_url=$APP_URL" >> $GITHUB_OUTPUT

  # ── Job 2: Export Credentials ──────────────────────────────────────────────
  export-credentials:
    name: Export Credentials
    runs-on: ubuntu-latest
    needs: provision

    steps:
      - name: Write .env file
        run: |
          {
            echo "AZURE_OPENAI_ENDPOINT=${{ needs.provision.outputs.openai_endpoint }}"
            echo "AZURE_OPENAI_API_KEY=***see-artifact***"
            echo "AZURE_OPENAI_API_VERSION=2024-02-01"
            echo "AZURE_OPENAI_CHAT_DEPLOYMENT=gpt-4o"
            echo "AZURE_OPENAI_EMBEDDING_DEPLOYMENT=text-embedding-ada-002"
            echo "AZURE_SEARCH_ENDPOINT=${{ needs.provision.outputs.search_endpoint }}"
            echo "AZURE_SEARCH_API_KEY=***see-artifact***"
            echo "AZURE_SEARCH_STUDY_INDEX=study-materials"
            echo "AZURE_SEARCH_CODE_INDEX=code-documentation"
            echo "CHUNK_SIZE=1000"
            echo "CHUNK_OVERLAP=200"
            echo "TOP_K=5"
          } > $GITHUB_WORKSPACE/.env

      - name: Upload .env as artifact
        uses: actions/upload-artifact@v4
        with:
          name: env-file
          path: ${{ github.workspace }}/.env
          retention-days: 1

      - name: Print endpoints
        run: |
          echo "OpenAI Endpoint : ${{ needs.provision.outputs.openai_endpoint }}"
          echo "Search Endpoint : ${{ needs.provision.outputs.search_endpoint }}"
          echo "App URL         : ${{ needs.provision.outputs.app_url }}"

  # ── Job 3: Deploy App to Azure App Service ─────────────────────────────────
  deploy:
    name: Deploy App
    runs-on: ubuntu-latest
    needs: provision

    env:
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure Login
        run: |
          az login --service-principal \
            -u ${{ secrets.AZURE_CLIENT_ID }} \
            -p ${{ secrets.AZURE_CLIENT_SECRET }} \
            --tenant ${{ secrets.AZURE_TENANT_ID }}

      - name: Zip app code
        run: |
          zip -r app.zip . \
            --exclude ".git/*" \
            --exclude ".terraform/*" \
            --exclude "__pycache__/*" \
            --exclude "*.pyc" \
            --exclude "terraform/*" \
            --exclude ".github/*" \
            --exclude "app.zip"

      - name: Deploy to Azure App Service
        run: |
          az webapp deploy \
            --resource-group study-assistant-rg \
            --name ${{ needs.provision.outputs.app_name }} \
            --src-path app.zip \
            --type zip \
            --subscription ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: App is live
        run: |
          echo "Deployment complete!"
          echo "App URL: ${{ needs.provision.outputs.app_url }}"
